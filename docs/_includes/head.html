<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <meta property="og:image" content="/logo-32x32.png">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta %}
  <!-- Begin Google tag -->
  {%- if false or jekyll.environment == 'production' -%}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6WYKC1VYKE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-6WYKC1VYKE');
  </script>
  {%- endif -%}
  <!-- End Google tag -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo-32x32.png">
  <!-- Styles -->
  <meta property="page_styles" content="{{page.styles}}">
  <meta property="layout_styles" content="{{layout.styles}}">
  {% for style in page.styles -%}
  <link rel="stylesheet" href="{{ "/assets/" | append: style | append: ".css" | relative_url }}">
  {% endfor -%}
  {% for style in layout.styles -%}
  <link rel="stylesheet" href="{{ "/assets/" | append: style | append: ".css" | " relative_url }}">
  {% endfor -%}
  <!-- End: Styles -->

</head>
