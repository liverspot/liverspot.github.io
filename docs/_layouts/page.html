---
layout: default
styles:
- standard1

---
<style>



  table td, th {
    padding: 2px 15px; /* Or a small value like 2px */
    vertical-align: top;
  }


  p, h4 { /*Shift contents of details right*/
  }
  ul {
    padding-inline-start: 20px;
  }

</style>
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
