---
layout: default
---
<style>

  .topic-arrow {
    float:right;
    border-top: 2px solid #2e6da4;
    font-size:20px;
    font-weight: bold;
    font-weight:700;
    color: #2e6da4;
    background-color: #deedf4;
  }

  a {
    overflow-wrap: break-word;
  }

  h3 {
    border-top: 2px solid #2e6da4;
    color: #2e6da4;
    break-after: avoid;
    page-break-after: avoid; /* Safari fallback */
  }

  h4 {
    color: #b81d3e;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: 600;
    line-height: 24px;
  }

  h5 {
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 20px;
    font-weight: 500;
    line-height: 34px;
  }

  h6 {
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    font-weight: 500;
    line-height: 28px;
  }

  table td, th {
    padding: 2px 15px; /* Or a small value like 2px */
    vertical-align: top;
  }


  p, h4 { /*Shift contents of details right*/
  }
  ul {
    padding-inline-start: 20px;
  }

</style>
<div class="home">
  {%- if page.title -%}
    <h1 class="page-heading">{{ page.title }}</h1>
  {%- endif -%}

  {{ content }}

</div>
